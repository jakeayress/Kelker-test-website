<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <!-- Inner fill ring -->
  <circle cx="50" cy="50" r="42" fill="rgba(255,255,255,0.05)"/>
  <!-- Lower green half -->
  <path d="M8 50 A42 42 0 0 0 92 50 Z" fill="rgba(75,122,60,0.55)"/>
  <!-- Field lines -->
  <line x1="18" y1="64" x2="82" y2="64" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
  <line x1="13" y1="74" x2="87" y2="74" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
  <!-- USDA text -->
  <text x="50" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="17" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">USDA</text>
  <!-- organic text -->
  <text x="50" y="82" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#ffffff" text-anchor="middle">organic</text>
</svg>
